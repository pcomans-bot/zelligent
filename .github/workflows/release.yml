name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: wasm32-wasip1

      - name: Build plugin
        run: |
          cd plugin
          cargo build --release --target wasm32-wasip1

      - name: Package release
        run: |
          VERSION=$(cat VERSION)
          mkdir -p zelligent-${VERSION}
          cp zelligent.sh zelligent-${VERSION}/zelligent
          cp plugin/target/wasm32-wasip1/release/zelligent-plugin.wasm zelligent-${VERSION}/
          cp -r claude-plugin zelligent-${VERSION}/
          cp README.md LICENSE zelligent-${VERSION}/
          tar -czf zelligent-${VERSION}-linux-x86_64.tar.gz zelligent-${VERSION}/

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: zelligent-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
